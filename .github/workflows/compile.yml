name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish when manually dispatching, e.g. v0.1.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  tauri:
    name: Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: pharaoh-macos-arm64
          - os: ubuntu-22.04
            artifact_name: pharaoh-linux-x64-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Type-check and build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Compile Tauri app
        if: runner.os != 'Linux'
        run: npm run tauri build -- --no-bundle

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: npm run tauri build -- --bundles appimage

      - name: Smoke-test Linux AppImage CLI
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [ -z "$appimage" ]; then
            echo "No AppImage found under src-tauri/target/release/bundle/appimage" >&2
            exit 1
          fi
          chmod +x "$appimage"
          APPIMAGE_EXTRACT_AND_RUN=1 "$appimage" setup hardware > appimage-cli-smoke.json
          test -s appimage-cli-smoke.json

      - name: Package macOS binary
        if: runner.os != 'Linux'
        shell: bash
        run: |
          mkdir -p "release/${{ matrix.artifact_name }}"
          cp src-tauri/target/release/pharaoh "release/${{ matrix.artifact_name }}/pharaoh"
          chmod +x "release/${{ matrix.artifact_name }}/pharaoh"
          cp README.md "release/${{ matrix.artifact_name }}/README.md"
          tar -czf "${{ matrix.artifact_name }}.tar.gz" -C release "${{ matrix.artifact_name }}"
          shasum -a 256 "${{ matrix.artifact_name }}.tar.gz" > "${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [ -z "$appimage" ]; then
            echo "No AppImage found under src-tauri/target/release/bundle/appimage" >&2
            exit 1
          fi
          cp "$appimage" "${{ matrix.artifact_name }}.AppImage"
          chmod +x "${{ matrix.artifact_name }}.AppImage"
          shasum -a 256 "${{ matrix.artifact_name }}.AppImage" > "${{ matrix.artifact_name }}.AppImage.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.tar.gz.sha256
            ${{ matrix.artifact_name }}.AppImage
            ${{ matrix.artifact_name }}.AppImage.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: tauri
    runs-on: ubuntu-22.04
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag_name }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            name="Pharaoh ${GITHUB_REF_NAME}"
            prerelease="false"
            make_latest="true"
            generate_notes="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${DISPATCH_TAG}" ]]; then
            tag="${DISPATCH_TAG}"
            name="Pharaoh ${DISPATCH_TAG}"
            if [[ "${DISPATCH_TAG}" == v* ]]; then
              prerelease="false"
              make_latest="true"
            else
              prerelease="true"
              make_latest="false"
            fi
            generate_notes="true"
          else
            tag="nightly"
            name="Pharaoh nightly"
            prerelease="true"
            make_latest="false"
            generate_notes="false"
          fi

          {
            echo "tag_name=${tag}"
            echo "release_name=${name}"
            echo "prerelease=${prerelease}"
            echo "make_latest=${make_latest}"
            echo "generate_notes=${generate_notes}"
          } >> "$GITHUB_OUTPUT"

      - name: Move rolling release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git tag -f nightly "$GITHUB_SHA"
          git push -f origin refs/tags/nightly

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          generate_release_notes: ${{ steps.release_meta.outputs.generate_notes }}
          body: |
            Automated Pharaoh build from `${{ github.sha }}`.

            The `nightly` release is replaced on every successful `master` build. Versioned `v*` tags publish stable releases.

            Linux AppImage CLI usage:
            `./pharaoh-linux-x64-appimage.AppImage setup hardware`

            Linux GUI notes:
            Launch the AppImage from a graphical X11 or Wayland desktop session. On Arch-based systems, install the GTK/WebKit runtime packages if they are missing, typically `webkit2gtk-4.1`, `gtk3`, `libayatana-appindicator`, `librsvg`, and `fuse2`.
          overwrite_files: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.AppImage
            release-artifacts/*.sha256
