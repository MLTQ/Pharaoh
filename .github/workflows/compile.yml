name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish when manually dispatching, e.g. v0.1.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  tauri:
    name: Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: pharaoh-macos-arm64
          - os: ubuntu-22.04
            artifact_name: pharaoh-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Type-check and build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Compile Tauri app
        run: npm run tauri build -- --no-bundle

      - name: Package binary
        shell: bash
        run: |
          mkdir -p "release/${{ matrix.artifact_name }}"
          cp src-tauri/target/release/pharaoh "release/${{ matrix.artifact_name }}/pharaoh"
          chmod +x "release/${{ matrix.artifact_name }}/pharaoh"
          cp README.md "release/${{ matrix.artifact_name }}/README.md"
          tar -czf "${{ matrix.artifact_name }}.tar.gz" -C release "${{ matrix.artifact_name }}"
          shasum -a 256 "${{ matrix.artifact_name }}.tar.gz" > "${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: tauri
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.sha256
